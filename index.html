<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Dream Heart Tunnel</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Cairo',sans-serif;
    touch-action:none; /* مهم للموبايل */
}

/* نفس باقي ستايلك بدون تغيير كبير */
canvas{display:block;}

</style>
</head>

<body>

<div id="introPage">
    <button class="enter-btn" onclick="startExperience()">
        ادخل عالم الذكريات ✨
    </button>
</div>

<div class="memory-label" id="label-container"></div>

<audio id="bgMusic" loop>
    <source src="/ssstik.io_1778745070621.mp3" type="audio/mpeg">
</audio>

<script>

let scene,camera,renderer,spotLight;
let memoryGroups=[];

let scrollY=0;
let currentTargetScroll=0;

/* TOUCH SUPPORT */
let touchStartY = 0;
let isTouching = false;

const memories = [
{img:'1.jpg', text:'حابب اقولك ان قلبك طيب وجميل'},
{img:'2.jpeg', text:'ضحكتك'},
{img:'3.jpeg', text:'أجمل وقت'},
{img:'4.jpeg', text:'يا خلاثي يا ناس'},
{img:'5.jpeg', text:'نينجا نينجا مفيش كلام 😂'},
{img:'6.jpeg', text:'اكيد حد كل اكلك 😂 😂'},
{img:'7.jpeg', text:'عليها باصة بتقول كلام كتير'},
{img:'8.jpeg', text:'القصة جنان 😂 😂'},
{video:'end.mp4', text:'الحضن ✨'}
];

function init(){

scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0xffd6f6,0.018);

camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,2000);
camera.position.set(0,2,10);

renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,2));

spotLight=new THREE.SpotLight(0xffffff,4);
spotLight.position.set(0,20,15);
scene.add(spotLight);

/* floor */
const floor=new THREE.Mesh(
new THREE.PlaneGeometry(100,2000),
new THREE.MeshStandardMaterial({color:0x7ed957})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

/* carpet */
const carpet=new THREE.Mesh(
new THREE.PlaneGeometry(7,2000),
new THREE.MeshStandardMaterial({color:0xff2e63})
);
carpet.rotation.x=-Math.PI/2;
carpet.position.y=0.02;
scene.add(carpet);

/* MEMORIES */
const loader=new THREE.TextureLoader();

memories.forEach((m,i)=>{

const group=new THREE.Group();
let frame;

if(m.video){
const video=document.createElement('video');
video.src=m.video;
video.loop=true;
video.muted=true;
video.playsInline=true;
video.autoplay=true;

video.play();

const tex=new THREE.VideoTexture(video);

frame=new THREE.Mesh(
new THREE.PlaneGeometry(11,6),
new THREE.MeshBasicMaterial({map:tex})
);

frame.position.set(0,5,-i*40);

}else{

const tex=loader.load(m.img);

frame=new THREE.Mesh(
new THREE.PlaneGeometry(5.5,7.5),
new THREE.MeshBasicMaterial({map:tex})
);

frame.position.set((i%2===0?6:-6),4.5,-i*40);
frame.rotation.y=i%2===0?-0.2:0.2;
}

group.add(frame);
scene.add(group);

memoryGroups.push({
mesh:frame,
group,
text:m.text,
z:-i*40
});
});

animate();
}

/* START */
function startExperience(){

document.getElementById("introPage").remove();

/* تشغيل الموسيقى (لازم user click) */
const music=document.getElementById("bgMusic");
music.play().catch(()=>{});

gsap.to(camera.position,{z:5,duration:2});
}

/* MOUSE SCROLL */
window.addEventListener('wheel',(e)=>{
currentTargetScroll+=e.deltaY*0.02;
});

/* TOUCH SCROLL (MOBILE FIX) */
window.addEventListener('touchstart',(e)=>{
touchStartY=e.touches[0].clientY;
isTouching=true;
});

window.addEventListener('touchmove',(e)=>{
if(!isTouching) return;

let y=e.touches[0].clientY;
let diff=touchStartY-y;

currentTargetScroll+=diff*0.02;

touchStartY=y;

e.preventDefault();
},{passive:false});

window.addEventListener('touchend',()=>{
isTouching=false;
});

function animate(){

requestAnimationFrame(animate);

scrollY += (currentTargetScroll-scrollY)*0.08;

camera.position.z = 10 - scrollY;

memoryGroups.forEach((m,i)=>{

const dist=Math.abs(camera.position.z-(m.z+5));

if(dist<20){
document.getElementById("label-container").innerText=m.text;
}

});

renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

init();

</script>

</body>
</html>س
