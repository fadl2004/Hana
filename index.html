<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Dream Heart Tunnel</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Cairo',sans-serif;
    touch-action:none;
}

/* INTRO HEART (رجعته زي ما هو) */
#introPage{
    position:fixed;
    inset:0;
    z-index:9999;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(to bottom,#ffd6f6,#ffc2de);
}

.heart-3d{
    width:200px;
    height:200px;
    position:relative;
    animation:float 3s ease-in-out infinite;
}

.heart-3d::before,
.heart-3d::after{
    content:"";
    position:absolute;
    width:100px;
    height:160px;
    background:#ff2e63;
    border-radius:100px 100px 0 0;
}

.heart-3d::before{
    left:100px;
    transform:rotate(-45deg);
}

.heart-3d::after{
    left:0;
    transform:rotate(45deg);
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}

.enter-btn{
    margin-top:40px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:#ff2e63;
    color:#fff;
    font-size:18px;
}

/* LABEL */
.memory-label{
    position:fixed;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    background:rgba(255,46,99,.7);
    padding:10px 20px;
    border-radius:20px;
    font-weight:bold;
    z-index:10;
}

canvas{display:block;}

</style>
</head>

<body>

<!-- INTRO + القلب -->
<div id="introPage">
    <div class="heart-3d"></div>

    <button class="enter-btn" onclick="startExperience()">
        ادخل عالم الذكريات ✨
    </button>
</div>

<div class="memory-label" id="label-container"></div>

<audio id="bgMusic" loop>
    <source src="/ssstik.io_1778745070621.mp3" type="audio/mpeg">
</audio>

<script>

let scene,camera,renderer;
let memoryGroups=[];

let scrollY=0;
let targetScroll=0;

/* TOUCH FIX */
let touchStartY=0;
let touching=false;

const memories=[
{img:'1.jpg',text:'قلبك طيب وجميل'},
{img:'2.jpeg',text:'ضحكتك'},
{img:'3.jpeg',text:'أجمل وقت'},
{img:'4.jpeg',text:'يا خلاثي'},
{img:'5.jpeg',text:'😂😂'},
{img:'6.jpeg',text:'اكل 😂'},
{img:'7.jpeg',text:'كلام كتير'},
{video:'end.mp4',text:'الحضن ✨'}
];

function init(){

scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0xffd6f6,0.018);

camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,2000);
camera.position.set(0,2,10);

renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,2));

const loader=new THREE.TextureLoader();

memories.forEach((m,i)=>{

const group=new THREE.Group();
let mesh;

if(m.video){

const video=document.createElement('video');
video.src=m.video;
video.loop=true;
video.muted=true;
video.playsInline=true;
video.autoplay=true;
video.play();

const tex=new THREE.VideoTexture(video);

mesh=new THREE.Mesh(
new THREE.PlaneGeometry(10,6),
new THREE.MeshBasicMaterial({map:tex})
);

mesh.position.set(0,5,-i*40);

}else{

const tex=loader.load(m.img);

mesh=new THREE.Mesh(
new THREE.PlaneGeometry(5.5,7.5),
new THREE.MeshBasicMaterial({map:tex})
);

mesh.position.set((i%2? -6:6),4.5,-i*40);
}

group.add(mesh);
scene.add(group);

memoryGroups.push({
mesh,
text:m.text,
z:-i*40
});

});

animate();
}

/* START */
function startExperience(){

document.getElementById("introPage").remove();

document.getElementById("bgMusic").play().catch(()=>{});

gsap.to(camera.position,{z:5,duration:2});
}

/* SCROLL MOUSE */
window.addEventListener('wheel',(e)=>{
targetScroll+=e.deltaY*0.02;
});

/* SCROLL TOUCH */
window.addEventListener('touchstart',(e)=>{
touchStartY=e.touches[0].clientY;
touching=true;
});

window.addEventListener('touchmove',(e)=>{
if(!touching) return;

let y=e.touches[0].clientY;
let diff=touchStartY-y;

targetScroll+=diff*0.02;
touchStartY=y;

e.preventDefault();
},{passive:false});

window.addEventListener('touchend',()=>{
touching=false;
});

function animate(){

requestAnimationFrame(animate);

scrollY += (targetScroll-scrollY)*0.08;

camera.position.z = 10 - scrollY;

memoryGroups.forEach((m,i)=>{

const dist=Math.abs(camera.position.z-(m.z+5));

if(dist<18){
document.getElementById("label-container").innerText=m.text;
}

});

renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

init();

</script>

</body>
</html>
